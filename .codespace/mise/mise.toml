min_version                             = "2026.3.9"

[settings]
jobs                                    = 16
auto_install                            = false
disable_hints                           = ["*"]
experimental                            = true
github_attestations                     = false
idiomatic_version_file_enable_tools     = ["bun", "node", "pnpm", "yarn"]
lockfile                                = false
log_level                               = "info"
npm.bun                                 = true
slsa                                    = false

[tools]
bun                                     = "1"
hyperfine                               = "1"
node                                    = "24"
pnpm                                    = "10"
yarn                                    = "4"

[shell_alias]
mx                                      = "mise x --"
mbx                                     = "mise x -- bunx"
mpx                                     = "mise x -- npx"
gwt                                     = "git worktree"

